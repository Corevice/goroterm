name: Android Deploy

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.4'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 -d > android/app/goroterm-release.jks

      - name: Create key.properties
        env:
          KEY_PROPERTIES: ${{ secrets.KEY_PROPERTIES }}
        run: echo "$KEY_PROPERTIES" > android/key.properties

      - name: Build AAB
        env:
          BUILD_NUMBER: ${{ github.run_number }}
        run: flutter build appbundle --release --build-number="$BUILD_NUMBER"

      - name: Build APK
        env:
          BUILD_NUMBER: ${{ github.run_number }}
        run: flutter build apk --release --build-number="$BUILD_NUMBER"

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: build/app/outputs/bundle/release/app-release.aab
          retention-days: 30

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true

      - name: Create service account JSON
        env:
          SERVICE_ACCOUNT_JSON: ${{ secrets.PLAY_STORE_SERVICE_ACCOUNT_JSON }}
        run: echo "$SERVICE_ACCOUNT_JSON" > google-play-service-account.json

      - name: Deploy to Play Store Internal Testing
        if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
        env:
          GOOGLE_PLAY_JSON_KEY_PATH: google-play-service-account.json
        run: bundle exec fastlane android deploy

      - name: Deploy to Play Store Production
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GOOGLE_PLAY_JSON_KEY_PATH: google-play-service-account.json
        run: bundle exec fastlane android deploy_production
